name: Build and Release App

on:
  push:
    tags:
      - 'v*' # จะทำงานเมื่อเราสร้าง Tag ชื่อขึ้นต้นด้วย v (เช่น v1.0.0)
  workflow_dispatch: # ปุ่มกดรันเอง

jobs:
  release:
    permissions:
      contents: write # อนุญาตให้บอทสร้างหน้า Release ได้

    strategy:
      fail-fast: false
      matrix:
        # สั่งเปิดเซิร์ฟเวอร์ 2 เครื่องพร้อมกัน!
        platform: [macos-latest, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # ถ้าเป็น Mac ให้ใช้ aarch64 (M1/M2/M3) ถ้าเป็น Win ให้ใช้ x86_64
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || 'x86_64-pc-windows-msvc' }}

      - name: Install Frontend Dependencies
        run: npm install

      - name: Build and Create Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # ดึงเลขเวอร์ชันมาจาก tauri.conf.json อัตโนมัติ
          tagName: v__VERSION__ 
          releaseName: 'fb-downloader-app v__VERSION__'
          releaseBody: 'ดาวน์โหลดโปรแกรมเวอร์ชันล่าสุดได้ที่นี่'
          releaseDraft: false # สร้างเป็นแบบร่างไว้ก่อน ให้เราเข้าไปตรวจก่อนปล่อยจริง
          prerelease: false